name: address
on:
  push:
    branches: [ "main" ]

jobs:
    broadcast:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: broadcast
          run: |
            npm install
